name: Daily Data
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
concurrency:
  group: data-write
  cancel-in-progress: false
permissions:
  contents: write
  models: read
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --omit=dev
      - name: Oil prices + crisis score
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/fetch-oil-prices.cjs
      - name: Sanctioned-vessel watchlist
        run: node scripts/fetch-watchlist.cjs || echo "non-fatal"
      - name: Dark intel (PortWatch etc)
        run: node scripts/fetch-darkintel.cjs || echo "non-fatal"
      - name: Dark fleet census
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
        run: node scripts/fetch-darkfleet.cjs || echo "non-fatal"
      - name: Freight signals
        run: node scripts/fetch-freight.cjs || echo "non-fatal"
      - name: Segment markets
        run: node scripts/fetch-markets.cjs || echo "non-fatal"
      - name: Country oil registry
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: node scripts/fetch-countries.cjs || echo "non-fatal"
      - name: Event archive
        run: node scripts/build-event-archive.cjs || echo "non-fatal"
      - name: Open datasets
        run: node scripts/build-open-data.cjs || echo "non-fatal"
      - name: WPSR
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-wpsr.cjs || echo "non-fatal"
      - name: Census snapshot (Mondays)
        run: |
          if [ "$(date -u +%u)" = "1" ] && [ -f public/data/darkfleet.json ]; then
            mkdir -p data-archive/census
            cp public/data/darkfleet.json "data-archive/census/$(date -u +%F).json"
          fi
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/data/countries-data.json src/data/open-current.json src/data/markets-data.json public/data/ data-archive/
          git diff --cached --quiet || { git commit -m "data: daily update"; git push || { git pull --rebase --autostash -q; git push; }; }
      - name: Ping IndexNow
        if: success()
        run: |
          H="crude""signal.io"
          python3 - <<PYEOF2
          import json, urllib.request
          h = "crude" + "signal.io"
          urls = ["/", "/hormuz", "/markets", "/oil", "/answers", "/data", "/posts",
                  "/is-the-strait-of-hormuz-open", "/why-are-oil-prices-rising",
                  "/is-the-iran-war-over", "/how-much-oil-goes-through-the-strait-of-hormuz",
                  "/crude-oil-inventory-report", "/brent-wti-spread-today",
                  "/crack-spread-today", "/steel-prices-today", "/lumber-prices-today", "/jet-fuel-and-airlines", "/oil-and-the-dollar", "/oil-and-inflation",
                  "/oil-tanker-attack-tracker", "/is-there-an-opec-meeting-today",
                  "/will-oil-prices-go-down", "/is-the-suez-canal-open",
                  "/strait-of-malacca-oil", "/desk/miami", "/desk/dominican-republic"]
          body = json.dumps({"host": h, "key": h.split(".")[0] + "-indexnow-key",
                             "keyLocation": "https://" + h + "/" + h.split(".")[0] + "-indexnow-key.txt",
                             "urlList": ["https://" + h + u for u in urls]}).encode()
          req = urllib.request.Request("https://api.indexnow.org/indexnow", data=body,
                                       headers={"Content-Type": "application/json"})
          try:
              print("indexnow:", urllib.request.urlopen(req, timeout=15).status)
          except Exception as e:
              print("indexnow skipped:", e)
          PYEOF2
      - name: Redeploy site
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          NUDGE_KEY: ${{ secrets.SITE_NUDGE_KEY }}
        run: |
          if [ -n "$HOOK" ]; then curl -s -X POST "$HOOK" > /dev/null && echo "deploy hook fired"; exit 0; fi
          if [ -z "$NUDGE_KEY" ]; then echo "no deploy trigger configured"; exit 0; fi
          # No Vercel hook: nudge the site repo over a write deploy key so its
          # git integration rebuilds (bakes fresh data via the build overlay).
          mkdir -p ~/.ssh && printf '%s\n' "$NUDGE_KEY" > ~/.ssh/nudge && chmod 600 ~/.ssh/nudge
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/nudge -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:asabo1/crude-signal.git /tmp/site -q
          cd /tmp/site
          date -u +%FT%TZ > .data-tick
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .data-tick && git commit -qm "data tick" && git push -q && echo "site nudged" 
